version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "deps(backend)"
      include: "scope"
    groups:
      security-all:
        applies-to: "security-updates"
        patterns:
          - "*"
      minor-and-patch:
        applies-to: "version-updates"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Never auto-open PRs for major version bumps on backend deps.
      # Python ecosystem majors (SQLAlchemy 1->2, Pydantic 1->2, FastAPI
      # majors) typically require code migration, not drive-by merges.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "deps(frontend)"
      include: "scope"
    groups:
      security-all:
        applies-to: "security-updates"
        patterns:
          - "*"
      minor-and-patch:
        applies-to: "version-updates"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Never auto-open PRs for major version bumps on frontend deps.
      # Majors frequently contain breaking changes (tailwind v4 moved
      # PostCSS plugin, eslint v9 flat config, etc.) that require code
      # changes, not drive-by merges. Upgrade deliberately in a dedicated
      # PR when ready.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "deps(ci)"
