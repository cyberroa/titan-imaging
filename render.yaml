# Render Blueprint — https://render.com/docs/blueprint-spec
# After connecting the repo, set secret env vars in the dashboard (DATABASE_URL, CORS_ORIGINS, …).

services:
  - type: web
    name: titan-imaging-api
    runtime: python
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Free tier does not support preDeployCommand; migrate + seed run at container start instead.
    startCommand: bash scripts/render_start.sh
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ADMIN_NOTIFY_EMAIL
        sync: false
      - key: EMAIL_FROM
        sync: false
